<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<title>东方角色检测系统</title>
		<!-- 引入 Tailwind CSS -->
		<link href="{{ url_for('static', filename='dist/output.css') }}" rel="stylesheet">
		<link rel="stylesheet" href="{{ url_for('static', filename='index_tailwind.css') }}" />
		<script src="https://cdn.socket.io/4.4.1/socket.io.min.js"></script>
		<script src="{{ url_for('static', filename='index.js') }}"></script>
	</head>
	<body class="min-h-screen flex flex-col bg-allbg bg-opacity-30">
		<!-- 整体容器 -->
		<div class="container mx-auto px-2 py-4 flex-1 flex flex-col">
			<!-- 标题区域 -->
			<header class="mb-4">
				<h1 class="text-4xl font-bold highlight">东方角色检测系统（幻想乡开盒系统）</h1>
			</header>

			<!-- 主要内容区域：左右布局 -->
			<div class="flex flex-col lg:flex-row lg:space-x-4 flex-1">
				<!-- 左侧：统计和地图 -->
				<div class="w-full lg:w-1/3 flex flex-col space-y-4">
					<!-- 统计区域 -->
					<div class="bg-countbg rounded-lg shadow p-4 h-fit">
						<div class="flex space-x-4">
							<!-- 角色统计 -->
							<div class="w-1/2">
								<h3 class="text-lg font-semibold mb-2">
									角色统计
								</h3>
								<div id="characterStats" class="space-y-2">
									<!-- 动态生成的角色统计内容 -->
								</div>
							</div>
							<!-- 地域统计 -->
							<div class="w-1/2">
								<h3 class="text-lg font-semibold mb-2">
									地域统计
								</h3>
								<div id="regionStats" class="space-y-2">
									<!-- 动态生成的地域统计内容 -->
								</div>
							</div>
						</div>
					</div>

					<!-- 地图区域 -->
					<div class="bg-mapbg bg-opacity-30 shadow p-4 h-fit bg-mapbg">
						<h3 class="text-lg font-semibold mb-2">地图</h3>
						<div
							id="textMap"
							class="font-mono text-sm leading-none"
						>
							<!-- 动态生成的文字地图 -->
						</div>
					</div>
				</div>

				<!-- 右侧：视频流和分类结果 -->
				<div class="w-full lg:w-2/3 flex flex-col space-y-4">
					<!-- 视频和分类结果的水平布局容器 -->
					<div class="flex space-x-4">
						<!-- 视频流 -->
						<div class="w-2/3 ">
							<div
								id="videoContainer"
								class="video-container bg-rightbg rounded-lg overflow-hidden"
							>
								<img
									id="videoStream"
									class="w-full h-full object-cover"
								/>
								<div
									id="fpsDisplay"
									class="absolute bottom-2 right-2 bg-rightbg bg-opacity-60 text-white text-sm px-2 py-1 rounded"
								>
									FPS: 0
								</div>
							</div>
						</div>

						<!-- 分类结果 -->
						<div class="w-1/3 ">
							<div
								id="classificationResults"
								class="bg-white p-4 rounded-lg shadow h-fit"
							>
								<!-- 动态生成的分类结果 -->
							</div>
						</div>
					</div>

					<!-- 控制按钮 -->
					<div class="flex items-center space-x-4 mt-2">
						<button
							id="startPauseBtn"
							class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded transition-colors duration-200"
						>
							启动
						</button>
						<button
							id="snapshotBtn"
							class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600"
						>
							截图
						</button>
						<div
							id="modelFpsDisplay"
							class="text-lg font-medium ml-4"
						>
							Model FPS: 0
						</div>
					</div>

					<!-- 画廊区域 -->
					<div class="w-full overflow-x-auto border-t pt-4 mt-4 bg-gallerybg bg-opacity-40">
						<h3 class="text-lg font-semibold mb-2">截图画廊</h3>
						<div id="gallery" class="flex space-x-4 p-2">
							<!-- 截图将在这里显示 -->
						</div>
					</div>

					<h3 class="text-lg font-semibold mb-2"><br/>注意：一次只能识别一个人物！</h3>
				</div>
			</div>
		</div>
	</body>
</html>
